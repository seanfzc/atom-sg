problem:
  id: "Q11"
  name: "Race Problem"
  source: "ACS Junior 2025 Paper 2, Page 27"
  question_text: |
    Ray and Wayne ran in a race around a 400-m track. Ray ran at a speed of 195 m/min and Wayne at a speed that was 25 m/min slower than Ray throughout the race.
    (a) How long would it take Ray to run a distance of 350 m more than Wayne?
    (b) How many complete rounds would Ray have finished when the above happened?
  answer_key:
    a: "14 min"
    b: "6 rounds"
  pathway: "Relative Speed"

